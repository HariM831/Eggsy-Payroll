name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No package-lock.json is committed (this repo was scaffolded without a
      # Node environment available to generate one), so `npm ci` can't run —
      # it requires an existing lockfile. Once a lockfile is committed here,
      # switch this to `npm ci` for reproducible, faster installs.
      - name: Install dependencies
        run: npm install

      - name: Build web app (also copies face-recognition models into the bundle)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Grant camera permission in the generated manifest
        run: node scripts/patch-android-manifest.mjs

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: niko-payroll-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
